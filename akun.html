
<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akun Saya | MoodFit</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

</head>

<body>

<div class="account-page">

    <div class="account-card animate__animated animate__fadeInUp">

        <div class="profile-circle">
            👤
        </div>

        <h1>Akun Saya</h1>

        <p class="welcome-text">
            Selamat datang kembali di MoodFit
        </p>

        <div class="user-info">

            <div class="info-box">

                <span>Email</span>

                <h3 id="userEmail">
                    Memuat...
                </h3>

            </div>

        </div>

        <div class="account-actions">

            <a href="mood-box.html" class="account-btn">
                🛍️ Belanja Sekarang
            </a>

            <a href="#" id="logoutBtn" class="logout-btn">
                🚪 Logout
            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCSkpX51ZsFWXFE06F869UfnjxZkAAfY4A",

authDomain: "moodfit-77c7a.firebaseapp.com",

databaseURL: "https://moodfit-77c7a-default-rtdb.firebaseio.com",

projectId: "moodfit-77c7a",

storageBucket: "moodfit-77c7a.firebasestorage.app",

messagingSenderId: "278596532420",

appId: "1:278596532420:web:84945a59e0a84cbc95b191"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

    if(user){

        document.getElementById("userEmail")
        .innerText = user.email;

    }else{

        window.location.href="login.html";

    }

});

document.getElementById("logoutBtn")
.addEventListener("click",()=>{

    signOut(auth)

    .then(()=>{

        Swal.fire({

            icon:'success',

            title:'Logout Berhasil',

            text:'Sampai jumpa kembali di MoodFit',

            confirmButtonColor:'#d9a8a1'

        }).then(()=>{

            window.location.href='index.html';

        });

    });

});

</script>

</body>
</html>
