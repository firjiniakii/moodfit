<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<title>Register</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <h1>Buat Akun MoodFit</h1>

        <p>
            Bergabunglah dengan MoodFit dan temukan outfit
            yang sesuai dengan mood kamu setiap hari.
        </p>

        <form id="registerForm">

            <input
            type="email"
            id="email"
            placeholder="Email"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <button type="submit" class="btn">
                Daftar Sekarang
            </button>

        </form>

        <p class="auth-link">
            Sudah punya akun?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module" src="js/register.js"></script>

</body>

</html>
